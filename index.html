<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday Hiba ❤️</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-pink-100 flex items-center justify-center min-h-screen">

  <div class="text-center p-6">
    <h1 class="text-5xl font-bold text-pink-600 mb-4">
      Happy Birthday Hiba 🎉
    </h1>

    <p class="text-lg text-gray-700 mb-2">
      On September 30, you turn 22 💖
    </p>

    <p class="text-lg text-gray-700 mb-6">
      You make my life brighter every day ✨
    </p>

    <button onclick="showMessage()" 
      class="bg-pink-500 text-white px-6 py-3 rounded-2xl shadow-lg hover:bg-pink-600 transition">
      Click for a surprise 🎁
    </button>

    <div id="message" 
      class="hidden mt-6 text-xl text-pink-700 font-semibold">
      I love you more than words can say 💕<br>
      You are the best thing that ever happened to me 💫<br>
      Forever yours ❤️
    </div>
  </div>
